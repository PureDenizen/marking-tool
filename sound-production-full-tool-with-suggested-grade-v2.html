<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marking Criteria - Sound Production for Media</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      padding: 20px;
      color: #1f2937;
    }
    h1 { margin-bottom: 10px; }
    .toolbar { margin-bottom: 12px; }
    button {
      margin: 10px 10px 10px 0;
      padding: 8px 14px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: white;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      vertical-align: top;
    }
    th { background: #eee; }
    .row-head {
      font-weight: bold;
      width: 140px;
    }
    .band-a { background: #dbeafe; }
    .band-b { background: #dcfce7; }
    .band-c { background: #fef3c7; }
    .band-d { background: #fde68a; }
    .band-e { background: #fecaca; }
    .band-f { background: #fca5a5; }
    label { display: block; cursor: pointer; }
    input { margin-right: 6px; }
    .results {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border: 1px solid #ccc;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 12px;
      margin: 12px 0 18px;
    }
    .stat {
      border: 1px solid #ddd;
      padding: 12px;
      background: #fafafa;
    }
    .small { color: #6b7280; font-size: 0.92rem; }
  </style>
</head>
<body>

<h1>Sound Production Marking Tool</h1>
<div class="toolbar">
  <button onclick="generateSummary()">Generate summary</button>
  <button onclick="resetAll()">Reset</button>
</div>

<table id="table"></table>

<div class="results" id="results">
  Select descriptors to generate feedback.
</div>

<script>
const criteria = [
{
title:"Criteria 1: Knowledge & Understanding",
bands:{
exceptional:"Exceptional understanding of sound design theory and advanced technical application.",
excellent:"Excellent understanding with confident technical execution.",
verygood:"Very good understanding applied competently.",
good:"Good understanding, though somewhat uneven in places.",
satisfactory:"Satisfactory understanding with some issues.",
insufficient:"Insufficient understanding."
}
},
{
title:"Criteria 2: Research & Enquiry",
bands:{
exceptional:"Exceptional research and enquiry, clearly informing decisions throughout.",
excellent:"Excellent research and enquiry applied effectively.",
verygood:"Very good research and enquiry supporting decisions.",
good:"Good research and enquiry, though somewhat limited in depth.",
satisfactory:"Satisfactory research and enquiry with limited integration.",
insufficient:"Insufficient research and enquiry."
}
},
{
title:"Criteria 3: Analysis & Reflection",
bands:{
exceptional:"Exceptional analysis and reflection with strong critical insight.",
excellent:"Excellent reflective analysis.",
verygood:"Very good reflective thinking.",
good:"Good reflection, though descriptive in places.",
satisfactory:"Satisfactory reflection with limited depth.",
insufficient:"Insufficient analysis and reflection."
}
},
{
title:"Criteria 4: Professional Working",
bands:{
exceptional:"Exceptional professionalism and workflow.",
excellent:"Excellent professional practice.",
verygood:"Very good organisation and working methods.",
good:"Good working practices, though inconsistent at times.",
satisfactory:"Satisfactory professionalism with some limitations.",
insufficient:"Insufficient evidence of professional working."
}
},
{
title:"Criteria 5: Presentation & Integrity",
bands:{
exceptional:"Exceptional presentation and academic integrity.",
excellent:"Excellent presentation and academic integrity.",
verygood:"Very good structure, presentation, and integrity.",
good:"Good presentation and integrity, though somewhat uneven.",
satisfactory:"Satisfactory presentation and integrity with some issues.",
insufficient:"Insufficient presentation and academic integrity."
}
}
];

const bands = [
{key:"exceptional", label:"80–100", value:90, class:"band-a"},
{key:"excellent", label:"70–79", value:75, class:"band-b"},
{key:"verygood", label:"60–69", value:65, class:"band-c"},
{key:"good", label:"50–59", value:55, class:"band-d"},
{key:"satisfactory", label:"40–49", value:45, class:"band-e"},
{key:"insufficient", label:"0–39", value:25, class:"band-f"}
];

const table = document.getElementById("table");

function buildTable() {
  let header = "<tr><th></th>";
  criteria.forEach(c => { header += `<th>${c.title}</th>`; });
  header += "</tr>";
  table.innerHTML = header;

  bands.forEach(b => {
    let row = `<tr><th class="row-head ${b.class}">${b.label}</th>`;
    criteria.forEach((c,i) => {
      row += `
      <td class="${b.class}">
        <label>
          <input type="radio" name="c${i}" value="${b.key}">
          ${c.bands[b.key]}
        </label>
      </td>`;
    });
    row += "</tr>";
    table.innerHTML += row;
  });
}

function suggestedGradeFromConvention(mark) {
  const rounded = Math.round(mark);
  const unit = ((rounded % 10) + 10) % 10;

  if (unit <= 3) return rounded - unit + 2;
  if (unit <= 6) return rounded - unit + 5;
  return rounded - unit + 8;
}

function generateSummary() {
  const selected = [...document.querySelectorAll("input:checked")];

  if (selected.length === 0) {
    document.getElementById("results").innerHTML = "Please select descriptors.";
    return;
  }

  let total = 0;
  let feedback = "";

  selected.forEach((s, i) => {
    const band = bands.find(b => b.key === s.value);
    total += band.value;
    feedback += `<li><strong>${criteria[i].title}:</strong> ${s.parentElement.innerText.trim()}</li>`;
  });

  const average = total / selected.length;
  const rounded = Math.round(average);
  const suggested = suggestedGradeFromConvention(average);

  document.getElementById("results").innerHTML = `
    <div class="stats">
      <div class="stat"><strong>Average</strong><br>${average.toFixed(1)}</div>
      <div class="stat"><strong>Rounded mark</strong><br>${rounded}</div>
      <div class="stat"><strong>Suggested grade</strong><br>${suggested}</div>
    </div>
    <ul>${feedback}</ul>
  `;
}

function resetAll() {
  document.querySelectorAll("input").forEach(i => i.checked = false);
  document.getElementById("results").innerHTML = "Select descriptors to generate feedback.";
}

buildTable();
</script>

</body>
</html>
