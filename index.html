<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marking Criteria - Sound Production for Media</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      padding: 20px;
      color: #1f2937;
    }
    h1 { margin-bottom: 10px; }
    .toolbar { margin-bottom: 12px; }
    button {
      margin: 10px 10px 10px 0;
      padding: 8px 14px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: white;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      vertical-align: top;
    }
    th { background: #eee; }
    .row-head {
      font-weight: bold;
      width: 140px;
    }
    .band-a { background: #dbeafe; }
    .band-b { background: #dcfce7; }
    .band-c { background: #fef3c7; }
    .band-d { background: #fde68a; }
    .band-e { background: #fecaca; }
    .band-f { background: #fca5a5; }
    label { display: block; cursor: pointer; }
    input { margin-right: 6px; }
    .results {
      margin-top: 20px;
      padding: 15px;
      background: white;
      border: 1px solid #ccc;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(160px, 1fr));
      gap: 12px;
      margin: 12px 0 18px;
    }
    .stat {
      border: 1px solid #ddd;
      padding: 12px;
      background: #fafafa;
    }
  </style>
</head>
<body>

<h1>Sound Production Marking Tool</h1>
<div class="toolbar">
  <button onclick="generateSummary()">Generate summary</button>
  <button onclick="resetAll()">Reset</button>
</div>

<table id="table"></table>

<div class="results" id="results">
  Select descriptors to generate feedback.
</div>

<script>
const criteria = [
{
title:"Criteria 1: Knowledge & Understanding",
bands:{
exceptional:"Exceptional understanding of sound design for moving image and/or interactive environments. Demonstrates a sophisticated grasp of relevant theories of sound, listening and media, which clearly informs the conceptual and practical development of the work. Technical practices such as recording, editing, processing and spatialisation are applied creatively and with precision, exceeding expectations. There is clear and confident understanding of how sound contributes to narrative, audience experience and meaning-making.",
excellent:"Excellent understanding of sound production and sound design for moving image and/or interactive environments. Demonstrates confident engagement with relevant theories and applies them clearly within the work. Technical practices such as recording, editing, processing and spatialisation are used effectively and with skill. There is strong awareness of how sound supports narrative and audience experience.",
verygood:"Very good understanding of key concepts and practices in sound production for media. Demonstrates clear awareness of relevant theory and its application. Technical practices are applied competently, though may lack the consistency or originality of higher bands. The relationship between sound and image or interaction is generally well understood.",
good:"Good but uneven understanding of sound production for media. Demonstrates familiarity with key concepts and techniques, though application may be inconsistent. Understanding of sound’s role in narrative or interaction is present but not always clearly realised.",
satisfactory:"Satisfactory but limited understanding of sound production for media. Core concepts and terminology may be unclear or inconsistently applied. Technical execution is basic, with noticeable issues. Understanding of sound’s contribution to narrative or experience is minimal.",
insufficient:"Insufficient understanding of sound production for media. The brief is misunderstood or poorly addressed. Technical execution is weak, with significant errors. There is little or no awareness of how sound functions in media contexts."
}
},
{
title:"Criteria 2: Research & Enquiry",
bands:{
exceptional:"Exceptional research and enquiry which is extensive, varied and rigorously applied. Demonstrates outstanding engagement with scholarly, artistic and practice-based sources. Research clearly informs technical, conceptual and aesthetic decisions throughout. Evidence of experimentation, testing and iteration is critically reflected upon.",
excellent:"Excellent research and enquiry which is wide-ranging and clearly relevant. Demonstrates strong engagement with appropriate sources. Research informs technical and creative decisions effectively, with clear evidence of experimentation and development.",
verygood:"Very good research and enquiry drawing on relevant sources. Research is applied meaningfully, though may be descriptive in places. Evidence of experimentation and iterative development is present but may lack depth.",
good:"Good but limited research and enquiry. Some relevant sources are used, though depth and scope may be restricted. Research supports the work but is not consistently integrated into decision-making.",
satisfactory:"Satisfactory but weak research and enquiry. Limited range of sources with superficial engagement. Research has minimal impact on the development of the work.",
insufficient:"Insufficient research and enquiry. Little or no engagement with relevant sources. Research does not support or inform the work."
}
},
{
title:"Criteria 3: Analysis, Critical Reflection, and Evaluation",
bands:{
exceptional:"Exceptional critical reflection demonstrating deep analytical insight into both process and outcome. Clearly articulates the reasoning behind technical, aesthetic and conceptual decisions in relation to theory and practice. Shows strong awareness of strengths, limitations and future development.",
excellent:"Excellent critical reflection demonstrating clear analysis of creative and technical decisions. Effectively relates practice to relevant theory. Strengths and weaknesses are identified with thoughtful evaluation.",
verygood:"Very good reflection with clear discussion of decisions and processes. Some analytical depth is evident, though reflection may occasionally be descriptive. Links to theory or practice are present but may not be fully developed.",
good:"Good reflection but largely descriptive. Some attempt at analysis and evaluation, though depth is limited. Connections to theory or future development may be superficial.",
satisfactory:"Satisfactory but minimal reflection. Limited evaluation of decisions and processes. Reflection is largely descriptive with little critical insight.",
insufficient:"Insufficient critical reflection. Little or no meaningful analysis. Work is described rather than evaluated."
}
},
{
title:"Criteria 4: Professional Working",
bands:{
exceptional:"Exceptional professionalism demonstrated through highly organised, independent and/or collaborative working. Clear evidence of effective time management, workflow planning and problem-solving. Documentation is thorough and supports a complex and well-executed project.",
excellent:"Excellent professional working with strong organisation and effective time management. Demonstrates reliable workflows and problem-solving. Documentation is clear and supports the development of the project.",
verygood:"Very good professional working with generally effective organisation and time management. Shows awareness of production workflows, though minor inconsistencies may be present.",
good:"Good but inconsistent professional working. Some evidence of organisation and engagement, though workflow and time management may be uneven.",
satisfactory:"Satisfactory but limited professional working. Organisation and time management are weak, impacting the quality of the work. Documentation is minimal.",
insufficient:"Insufficient professional working. Little evidence of organisation, engagement or responsibility. Work may be incomplete or poorly managed."
}
},
{
title:"Criteria 5: Structure, Presentation, Referencing, and Academic Integrity",
bands:{
exceptional:"Exceptional presentation demonstrating a highly professional and coherent portfolio. Work is clearly structured, technically polished and meets all requirements. Writing is academically rigorous and clearly expressed. Referencing is accurate and comprehensive, demonstrating full academic integrity.",
excellent:"Excellent presentation with a well-structured and polished portfolio. Writing is clear and well organised. Referencing is accurate with only minor issues. Academic integrity is clearly demonstrated.",
verygood:"Very good presentation with clear structure and organisation. Minor issues may be present in writing or referencing. Academic integrity is maintained.",
good:"Good but inconsistent presentation. Work is generally coherent but may lack polish. Writing and referencing may contain errors. Academic integrity is maintained.",
satisfactory:"Satisfactory presentation with noticeable issues in structure, clarity or technical quality. Referencing is incomplete or inconsistent. Writing contains frequent errors.",
insufficient:"Insufficient presentation. Work is poorly structured and difficult to follow. Referencing is absent or incorrect. Academic integrity may be in question."
}
}
];

const bands = [
{key:"exceptional", label:"80–100", value:90, class:"band-a"},
{key:"excellent", label:"70–79", value:75, class:"band-b"},
{key:"verygood", label:"60–69", value:65, class:"band-c"},
{key:"good", label:"50–59", value:55, class:"band-d"},
{key:"satisfactory", label:"40–49", value:45, class:"band-e"},
{key:"insufficient", label:"0–39", value:25, class:"band-f"}
];

const table = document.getElementById("table");

function buildTable() {
  let header = "<tr><th></th>";
  criteria.forEach(c => { header += `<th>${c.title}</th>`; });
  header += "</tr>";
  table.innerHTML = header;

  bands.forEach(b => {
    let row = `<tr><th class="row-head ${b.class}">${b.label}</th>`;
    criteria.forEach((c,i) => {
      row += `
      <td class="${b.class}">
        <label>
          <input type="radio" name="c${i}" value="${b.key}">
          ${c.bands[b.key]}
        </label>
      </td>`;
    });
    row += "</tr>";
    table.innerHTML += row;
  });
}

function suggestedGradeFromConvention(mark) {
  const rounded = Math.round(mark);
  const unit = ((rounded % 10) + 10) % 10;
  if (unit <= 3) return rounded - unit + 2;
  if (unit <= 6) return rounded - unit + 5;
  return rounded - unit + 8;
}

function generateSummary() {
  const selected = [...document.querySelectorAll("input:checked")];

  if (selected.length === 0) {
    document.getElementById("results").innerHTML = "Please select descriptors.";
    return;
  }

  let total = 0;
  let feedback = "";

  selected.forEach((s) => {
    const criteriaIndex = Number(s.name.replace("c", ""));
    const band = bands.find(b => b.key === s.value);
    total += band.value;

    feedback += `
      <li>
        <strong>${criteria[criteriaIndex].title}:</strong>
        ${criteria[criteriaIndex].bands[s.value]}
      </li>`;
  });

  const average = total / selected.length;
  const rounded = Math.round(average);
  const suggested = suggestedGradeFromConvention(average);

  document.getElementById("results").innerHTML = `
    <div class="stats">
      <div class="stat"><strong>Average</strong><br>${average.toFixed(1)}</div>
      <div class="stat"><strong>Rounded mark</strong><br>${rounded}</div>
      <div class="stat"><strong>Suggested grade</strong><br>${suggested}</div>
    </div>
    <ul>${feedback}</ul>
  `;
}

function resetAll() {
  document.querySelectorAll("input").forEach(i => i.checked = false);
  document.getElementById("results").innerHTML = "Select descriptors to generate feedback.";
}

buildTable();
</script>

</body>
</html>
